version: 1
filesystem_policy:
  include_workdir: true
  read_only:
  - /usr
  - /lib
  - /proc
  - /dev/urandom
  - /app
  - /etc
  - /var/log
  read_write:
  - /sandbox
  - /tmp
  - /workspace
  - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude-code
    endpoints:
    - host: api.anthropic.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      access: full
    - host: statsig.anthropic.com
      port: 443
    - host: sentry.io
      port: 443
    - host: raw.githubusercontent.com
      port: 443
    - host: platform.claude.com
      port: 443
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/bin/node
  cursor:
    name: cursor
    endpoints:
    - host: cursor.blob.core.windows.net
      port: 443
    - host: api2.cursor.sh
      port: 443
    - host: repo.cursor.sh
      port: 443
    - host: download.cursor.sh
      port: 443
    - host: cursor.download.prss.microsoft.com
      port: 443
    binaries:
    - path: /usr/bin/curl
    - path: /usr/bin/wget
    - path: /sandbox/.cursor-server/**
  github_rest_api:
    name: github-rest-api
    endpoints:
    - host: api.github.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      access: read-only
    binaries:
    - path: /usr/local/bin/claude
    - path: /usr/bin/gh
  github_ssh_over_https:
    name: github-ssh-over-https
    endpoints:
    - host: github.com
      port: 443
      protocol: rest
      tls: terminate
      enforcement: enforce
      rules:
      - allow:
          method: GET
          path: /**/info/refs*
      - allow:
          method: POST
          path: /**/git-upload-pack
    binaries:
    - path: /usr/bin/git
  ollama:
    name: ollama
    endpoints:
    - host: 127.0.0.1
      port: 11434
    binaries:
    - path: /usr/bin/curl
    - path: /bin/bash
    - path: /usr/local/bin/opencode
  # yfinance → Yahoo Finance HTTPS APIs (add more hosts if requests fail, e.g. guce.yahoo.com).
  # FMP → https://financialmodelingprep.com/api/... (add api subdomain if your client uses it).
  # Extend `endpoints` with any other host:443 for HTTPS or host:80 for plain HTTP.
  market_data:
    name: market-data
    endpoints:
    - host: query1.finance.yahoo.com
      port: 443
    - host: query2.finance.yahoo.com
      port: 443
    - host: financialmodelingprep.com
      port: 443
    - host: site.financialmodelingprep.com
      port: 443
    binaries:
    - path: /sandbox/.venv/bin/python
    - path: /sandbox/.venv/bin/python3
    - path: /app/.venv/bin/python
    - path: /app/.venv/bin/python3
    - path: /usr/bin/curl
  opencode:
    name: opencode
    endpoints:
    - host: registry.npmjs.org
      port: 443
    - host: opencode.ai
      port: 443
    - host: integrate.api.nvidia.com
      port: 443
    binaries:
    - path: /usr/lib/node_modules/opencode-ai/bin/.opencode
    - path: /usr/bin/node
    - path: /usr/local/bin/opencode
  pypi:
    name: pypi
    endpoints:
    - host: pypi.org
      port: 443
    - host: files.pythonhosted.org
      port: 443
    - host: github.com
      port: 443
    - host: objects.githubusercontent.com
      port: 443
    - host: api.github.com
      port: 443
    - host: downloads.python.org
      port: 443
    binaries:
    - path: /sandbox/.venv/bin/python
    - path: /sandbox/.venv/bin/python3
    - path: /sandbox/.venv/bin/pip
    - path: /app/.venv/bin/python
    - path: /app/.venv/bin/python3
    - path: /app/.venv/bin/pip
    - path: /usr/local/bin/uv
    - path: /sandbox/.uv/python/**
  vscode:
    name: vscode
    endpoints:
    - host: update.code.visualstudio.com
      port: 443
    - host: az764295.vo.msecnd.net
      port: 443
    - host: vscode.download.prss.microsoft.com
      port: 443
    - host: marketplace.visualstudio.com
      port: 443
    - host: gallerycdn.vsassets.io
      port: 443
    binaries:
    - path: /usr/bin/curl
    - path: /usr/bin/wget
    - path: /sandbox/.vscode-server/**
    - path: /sandbox/.vscode-remote-containers/**
